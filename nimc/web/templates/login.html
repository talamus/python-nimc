{% extends "base.html" %}

{% block title %} Login {% endblock %}
{% block page_id %} auth {% endblock %}

{% block content %}
<div class="auth-container" x-data="{ submitting: false }">
    <div class="box">
        <h2 class="box-title">Login</h2>
        <form hx-post="/api/auth/login"
              hx-target="#error-message"
              hx-swap="innerHTML"
              @htmx:before-request="submitting = true"
              @htmx:after-request="submitting = false">

            <label class="form-field">
                <span class="label">Username</span>
                <input type="text" id="username" name="username" required autofocus :disabled="submitting">
            </label>

            <label class="form-field">
                <span class="label">Password</span>
                <input type="password" id="password" name="password" required :disabled="submitting">
            </label>

            <button type="submit" class="btn btn-primary login-button" :disabled="submitting">
                Login
            </button>
        </form>
    </div>
    <div class="message">
        <p x-show="submitting">Logging in...</p>
        <p x-show="!submitting" id="error-message">&nbsp;</p>
    </div>
</div>
{% endblock %}
